<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Amor Eterno</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            color: white;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: blink 2s infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .card {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 80%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffb7c5;
            text-shadow: 0 0 10px #ffb7c5;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .heart {
            color: #ff4d6d;
            font-size: 50px;
            animation: beat 1.2s infinite;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="stars-container"></div>
    <div class="card">
        <div class="heart">❤</div>
        <h1>Eres mi universo entero</h1>
        <p>Así como las estrellas no dejan de brillar,<br> 
        mi amor por ti no tiene final.</p>
        <p><strong>Te amo hoy, mañana y siempre.</strong></p>
    </div>
    <script>
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(star);
        }
    </script>
</body>
</html>
